<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Traversal</title>
  </head>
  <body>
    <ul id="item-list">
      <li>Item 1 <button class="delete-btn">Xóa</button></li>
      <li>Item 2 <button class="delete-btn">Xóa</button></li>
      <li>Item 3 <button class="delete-btn">Xóa</button></li>
      <li>Item 4 <button class="delete-btn">Xóa</button></li>
      <li>Item 5 <button class="delete-btn">Xóa</button></li>
    </ul>

    <script>
      const deleteButtons = document.querySelectorAll(".delete-btn");

      deleteButtons.forEach((button) => {
        button.addEventListener("click", function () {
          const li = this.parentElement;
          li.remove();
        });
      });
    </script>
  </body>
</html>
